<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e40af" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="16" stdDeviation="16" flood-color="#1e3a8a" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background Rounded Rect -->
  <rect width="512" height="512" rx="128" fill="#0f172a" />
  
  <!-- Flow Kanban Icon Shape -->
  <g transform="translate(96, 96)" filter="url(#shadow)">
    <!-- Column 1 (Left, shorter) -->
    <rect x="0" y="48" width="80" height="160" rx="20" fill="url(#blueGrad)" />
    <!-- Column 2 (Middle, taller) -->
    <rect x="120" y="0" width="80" height="256" rx="20" fill="url(#blueGrad)" />
    <!-- Column 3 (Right, medium) -->
    <rect x="240" y="80" width="80" height="192" rx="20" fill="url(#blueGrad)" />
    <!-- Connected Dots -->
    <circle cx="40" cy="128" r="16" fill="#ffffff" opacity="0.9"/>
    <circle cx="160" cy="128" r="16" fill="#ffffff" opacity="0.9"/>
    <circle cx="280" cy="176" r="16" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>